name: Daily CHN Route Generation

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout main（脚本在 main）
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 2. 安装 Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install requests

      # 3. 在 main 分支运行脚本（生成文件）
      - run: python3 gen-chnroute.py

      # 4. 切换到 conf 分支（如果不存在则创建）
      - run: |
          git fetch origin
          git checkout conf || git checkout -b conf

      # 5. 从 main 分支取出生成的文件（正确做法）
      - run: |
          git checkout main -- fortios_isp_*.conf.txt
          git checkout main -- .github/temp/*.txt 2>/dev/null || true

      # 6. 提交变更到 conf 分支
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add fortios_isp_*.conf.txt .github/temp/*.txt
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "chore: Auto-generate routes - $(date -u +'%Y-%m-%d %H:%M:%S')"
            git push origin conf
          )

      # 7. 上传 artifacts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-routes
          path: fortios_isp_*.conf.txt
          retention-days: 30
