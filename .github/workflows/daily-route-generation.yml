name: Daily CHN Route Generation

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout main
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # 2. Create working directory
      - name: Prepare working directory
        run: mkdir -p .github/temp/output

      # 3. Install Python
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install requests
        working-directory: .github/temp

      # 4. Run Python script using relative path
      - name: Run generator
        run: python ../../gen-chnroute.py
        working-directory: .github/temp

      # 5. Copy output to root before checkout (关键修复点)
      - name: Copy output to root
        run: |
          mkdir -p output_copy
          cp .github/temp/output/* output_copy/

      # 6. Push output_copy to conf branch
      - name: Push to conf branch
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git fetch origin conf || true
          git checkout -b temp-update

          git add output_copy/*
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update routes - $(date -u +'%Y-%m-%d %H:%M:%S')"

          git push origin temp-update:conf --force

      # 7. Cleanup
      - name: Cleanup
        run: rm -rf output_copy .github/temp/output/*
