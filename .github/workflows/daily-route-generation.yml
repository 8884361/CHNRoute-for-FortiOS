name: Daily CHN Route Generation

on:
  schedule:
    - cron: '30 16 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - run: pip install requests

      # 在 main 分支运行脚本
      - run: python3 gen-chnroute.py

      # 提交到 conf 分支（不切换目录）
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # 确保 conf 分支存在
          git fetch origin conf || true

          # 创建临时分支用于提交
          git checkout -b temp-update

          git add fortios_isp_*.conf.txt .github/temp/*.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: Auto-generate routes - $(date -u +'%Y-%m-%d %H:%M:%S')"

          # 强制推送到 conf 分支（覆盖 conf 分支内容）
          git push origin temp-update:conf --force

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-routes
          path: fortios_isp_*.conf.txt
          retention-days: 30
